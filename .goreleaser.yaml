version: 2

project_name: dwarpal

before:
  hooks:
    - go mod tidy

builds:
  - id: dwarpal
    main: ./cmd/dwarpal
    binary: dwarpal
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: dwarpal
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

# macOS code signing + notarization (cross-platform via goreleaser's built-in
# quill — no macOS runner needed). Dormant until the four MACOS_* secrets
# exist in the repo; releases work unchanged without them. Setup runbook:
# docs/notarization.md
notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids: [dwarpal]
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"       # base64 of Developer ID Application .p12
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}" # App Store Connect issuer UUID
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"             # base64 of the .p8 API key
        wait: true
        timeout: 20m

checksum:
  name_template: "checksums.txt"

# sboms:
#   - artifacts: archive

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

# Homebrew cask (goreleaser v2's replacement for the deprecated `brews`).
homebrew_casks:
  - name: dwarpal
    repository:
      owner: YellowFoxH4XOR
      name: homebrew-tap
      # Cross-repo push needs a PAT with repo scope on homebrew-tap; the
      # workflow passes secrets.HOMEBREW_TAP_GITHUB_TOKEN (falls back to the
      # run's GITHUB_TOKEN, which only works for same-repo taps).
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/YellowFoxH4XOR/dwarpal"
    description: "A quality firewall between AI coding agents and your repository"
    # Until notarization is activated (docs/notarization.md, dormant per ADR
    # 0001), the binary is unsigned, so Homebrew's cask quarantine would make
    # Gatekeeper block first run. Strip the quarantine bit on install — the
    # GoReleaser-documented free alternative to notarization. Removing this is
    # safe once signing is live.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/dwarpal"]
          end
    commit_author:
      name: YellowFoxH4XOR
      email: yellowfoxh4xor@gmail.com
