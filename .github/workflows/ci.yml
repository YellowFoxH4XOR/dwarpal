name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            test: go test ./... -race -count=1
          - os: macos-latest
            test: go test ./... -race -count=1
          # Windows: the race detector needs a C toolchain the runner lacks,
          # so run without -race. This job exists to prove the POSIX-sh hooks
          # and path handling work under Git for Windows (PRD §11 Q3).
          - os: windows-latest
            test: go test ./... -count=1
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: ${{ matrix.test }}

      - name: go build
        run: go build ./...
